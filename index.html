<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligne Directe Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; background: #121212; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; 
        }
        .status { margin-bottom: 30px; font-weight: 300; color: #00ff88; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        button { 
            padding: 20px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer;
            transition: all 0.2s; font-size: 1rem;
        }
        #call-btn { background: #28a745; color: white; width: 150px; }
        #hangup-btn { background: #dc3545; color: white; display: none; width: 150px; }
        select { 
            margin-top: 20px; padding: 10px; border-radius: 5px; background: #333; color: white; border: 1px solid #555; 
            width: 250px;
        }
        .ringing { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="status" class="status">Initialisation...</div>
    
    <div class="controls">
        <button id="call-btn">APPELER</button>
        <button id="hangup-btn">RACCROCHER</button>
    </div>

    <select id="audio-output">
        <option value="">Sortie audio par défaut</option>
    </select>

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
