<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Directe</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
        #status { margin: 20px; padding: 15px; border-radius: 8px; background: white; font-weight: bold; }
        .controls { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button { padding: 15px 25px; font-size: 16px; cursor: pointer; border-radius: 50px; border: none; width: 80%; max-width: 300px; }
        #btn-speaker { background: #007bff; color: white; display: none; }
        #btn-start { background: #28a745; color: white; }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    </head>
<body>
    <h1>📞 Ligne Privée</h1>
    <div id="status">Initialisation du micro...</div>

    <div class="controls">
        <button id="btn-start">ACTIVER LE SON 🔊</button>
        <button id="btn-speaker">PASSER SUR LE HAUT-PARLEUR 📢</button>
        <button onclick="location.reload()" style="background:#ccc;">Relancer la page</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
